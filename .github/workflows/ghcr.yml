name: Build and push vluna OSS image by tag

on:
  push:
    branches:
      - main
    tags:
      - 'community-*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag and set image config
        id: config
        run: |
          TAG_NAME='${{ github.ref_name }}'
          echo "TAG_NAME=${TAG_NAME}"

          PREFIX="${TAG_NAME%%-*}"
          VERSION="${TAG_NAME#*-}"

          case "${PREFIX}" in
            community)
              IMAGE_NAME='vluna-community'
              DOCKERFILE='./infra/docker/Dockerfile.community'
              EDITION='community'
              ;;
            *)
              echo "Unsupported tag prefix: ${PREFIX}"
              echo "Currently supported: community-*"
              exit 1
              ;;
          esac

          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "edition=${EDITION}" >> "$GITHUB_OUTPUT"

      - name: Show build config
        run: |
          echo "Tag:        ${{ steps.config.outputs.prefix }}-${{ steps.config.outputs.version }}"
          echo "Image name: ${{ steps.config.outputs.image_name }}"
          echo "Dockerfile: ${{ steps.config.outputs.dockerfile }}"
          echo "Edition:    ${{ steps.config.outputs.edition }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          build-args: |
            EDITION=${{ steps.config.outputs.edition }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.config.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.config.outputs.image_name }}:${{ steps.config.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.config.outputs.image_name }}:${{ github.ref_name }}
