version: v2

## Global data (realm-agnostic)
realms:
  - realm_id: demo-realm-1
    name: Demo Realm
    status: active
    metadata:
      principal_resolver:
        issuers:
          - issuer: "https://v.id.tapray.com/oidc"
            jwks_uri: "https://v.id.tapray.com/oidc/jwks"
            audiences: ["https://monorepo.api.tapray.com"]
            alg_whitelist: ["RS256","RS384","RS512","ES256","ES384","ES512"]
            claim_rules:
              - when: "has('organization_id')"
                principal:
                  id: "$.organization_id"
                  source: "oidc:<iss>"
                  type: "organization"
              - when: "has('sub')"
                principal:
                  id: "$.sub"
                  source: "oidc:<iss>"
                  type: "user"
            on_missing: "delegate_to_s2s"
      auth:
        scope_claim: scope
        issuer_root: 'https://v.id.tapray.com'
        webhook:
          provider: logto
          signing_key: '<<<SET_IN_ENV>>>'
          header_name: logto-signature-sha-256
        clients:
          m2m:
            client_id: '<<<SET_IN_ENV>>>'
            client_secret: '<<<SET_IN_ENV>>>'
            resource: 'https://default.logto.app/api'
          web:
            client_id: '<<<SET_IN_ENV>>>'
            client_secret: '<<<SET_IN_ENV>>>'
        issuers:
          - issuer: 'https://v.id.tapray.com/oidc'
            audiences:
              - 'https://monorepo.api.tapray.com'
            jwks_uri: 'https://v.id.tapray.com/oidc/jwks'
      payments:
        stripe:
          mode: test
          api_keys:
            test: '<<<SET_IN_ENV>>>'
          webhooks:
            - name: payment
              test: '<<<SET_IN_ENV>>>'
          public_webhook_base_url: '<<<SET_IN_ENV>>>'
      billing_defaults:
        period:
          kind: calendar
          cadence: monthly
          issue_anchor: calendar_start
          timezone: UTC
          grace_window_seconds: 86400
          billing_mode: prepaid
      currencies:
        - currency: CREDIT
          xusd_rate: 10000

service_api_keys:
  - key_id: 'svc-key-1'
    status: 'active'
    allowed_realms: ['demo-realm-1', 'demo-realm-2']
    allowed_accounts: []
    scopes: []
    kdf_alg: 'HKDF-SHA256'
    kdf_salt_hex: 'a3b1c5d7e9f1023456789abcdeffedcb00112233445566778899aabbccddeeff'
    kdf_version: 1
    env_tag: 'prod'
  - key_id: 'svc-key-2'
    status: 'active'
    allowed_realms: ['demo-realm-1', 'demo-realm-2']
    allowed_accounts: []
    scopes: []
    kdf_alg: 'HKDF-SHA256'
    kdf_salt_hex: '5f4dcc3b5aa765d61d8327deb882cf99112233445566778899aabbccddeeff00'
    kdf_version: 1
    env_tag: 'prod'

## Per-realm data
realm_data:
  - realm_id: demo-realm-1

    # Account + contract + terms (account-scoped) for local testing.
    # We seed a deterministic billing_account_id that can be reused across demos:
    #   billing_principal_id: i3pkhewz0gll
    #   billing_account_id:  00000000-0000-0000-0000-000000000000
    billing_accounts:
      - billing_account_id: '00000000-0000-0000-0000-000000000000'
        billing_principal_id: i3pkhewz0gll
        metadata: { seed: true, kind: demo }

    catalog_products:
      - product_code: prod_pro_001
        catalog_product_id: 10000000-0000-4000-8000-000000000001
        provider: stripe
        provider_product_id: prod_pro_001
        kind: subscription
        status: active
        name: pro_plan
        default_currency: USD
      - product_code: prod_team_001
        catalog_product_id: 10000000-0000-4000-8000-000000000002
        provider: stripe
        provider_product_id: prod_team_001
        kind: subscription
        status: active
        name: team_plan
        default_currency: USD
      - product_code: prod_legacy_001
        catalog_product_id: 10000000-0000-4000-8000-000000000003
        provider: stripe
        provider_product_id: prod_legacy_001
        kind: subscription
        status: archived
        name: legacy_plan
        default_currency: USD
      - product_code: prod_credits_1000
        catalog_product_id: 10000000-0000-4000-8000-000000000004
        provider: stripe
        provider_product_id: prod_credits_1000
        kind: credit
        status: active
        name: starter_credits
        default_currency: USD
      - product_code: prod_credits_draft
        catalog_product_id: 10000000-0000-4000-8000-000000000005
        provider: stripe
        provider_product_id: prod_credits_draft
        kind: credit
        status: draft
        name: draft_credits
        default_currency: USD

    catalog_prices:
      - price_code: price_pro_m_001
        catalog_price_id: 20000000-0000-4000-8000-000000000001
        product_code: prod_pro_001
        subscription_group_key: base-plan
        currency: USD
        unit_amount: 999
        recurring_interval: month
        recurring_count: 1
        display_priority: 10
        metadata:
          billing_plan_code: pro

      - price_code: price_pro_y_001
        catalog_price_id: 20000000-0000-4000-8000-000000000002
        product_code: prod_pro_001
        subscription_group_key: base-plan
        currency: USD
        unit_amount: 9999
        recurring_interval: year
        recurring_count: 1
        display_priority: 20
        metadata:
          billing_plan_code: pro_postpaid

      - price_code: price_team_m_001
        catalog_price_id: 20000000-0000-4000-8000-000000000003
        product_code: prod_team_001
        subscription_group_key: base-plan
        currency: USD
        unit_amount: 2999
        recurring_interval: month
        recurring_count: 1
        display_priority: 10
        metadata:
          billing_plan_code: pro_team

      - price_code: price_team_y_001
        catalog_price_id: 20000000-0000-4000-8000-000000000004
        product_code: prod_team_001
        subscription_group_key: base-plan
        currency: USD
        unit_amount: 29999
        recurring_interval: year
        recurring_count: 1
        display_priority: 20
        metadata:
          billing_plan_code: pro_team

      - price_code: price_credit_1000
        catalog_price_id: 20000000-0000-4000-8000-000000000005
        product_code: prod_credits_1000
        currency: USD
        unit_amount: 5000
        recurring_interval: null
        recurring_count: null
        display_priority: 10
        metadata:
          grants:
            - grant_program_code: one_time_xusd
              amount_xusd: 50000000
              window_kind_override: relative
              window_relative_seconds_override: 31536000
          billing_plan_code: paid_non_sub

      - price_code: price_credit_drf
        catalog_price_id: 20000000-0000-4000-8000-000000000006
        product_code: prod_credits_draft
        currency: USD
        unit_amount: 1000
        recurring_interval: null
        recurring_count: null
        display_priority: 10
        metadata:
          grants:
            - grant_program_code: one_time_xusd
              amount_xusd: 10000000
              window_kind_override: relative
              window_relative_seconds_override: 31536000
          billing_plan_code: paid_non_sub

    feature_families:
      - feature_family_code: llm.standard
        name: LLM Standard
        description: Standard LLM family
      - feature_family_code: llm.premium
        name: LLM Premium
        description: Premium LLM family
      - feature_family_code: llm.multimodal
        name: LLM Multimodal
        description: Multimodal vision/image family
      - feature_family_code: svc.tools
        name: Service Tools
        description: Internal tools feature_family
      - feature_family_code: outcome.based.billing
        name: Outcome Based Billing
        description: Outcome Based Billing
      - feature_family_code: billing.seats
        name: Seat Billing
        description: Seat usage billing

    features:
      - feature_code: openai.gpt5
        feature_family_code: llm.premium
        name: OpenAI GPT-5
        description: Access to GPT-5 APIs
        unit: tokens
        meters:
        - meter_prices:
            unit_cost_xusd: 180
        - meter_code: openai.gpt5.tokens.input
        - meter_code: openai.gpt5.tokens.output
        - meter_code: openai.gpt5.tokens.cached
          meter_prices:
            unit_cost_xusd: 20

      - feature_code: openai.gpt-4o
        feature_family_code: llm.standard
        name: OpenAI GPT-4o
        description: Access to GPT-4o APIs
        entitlement_required: false
        meters:
        - unit: tokens
          meter_prices:
            unit_price_base_xusd: 150
            unit_price_dynamic_xusd: 10
            unit_price_xusd: 160
            unit_cost_xusd: 120
        - meter_code: openai.gpt-4o.tokens.input
          meter_prices:
            unit_price_base_xusd: 150
            unit_cost_xusd: 130
        - meter_code: openai.gpt-4o.tokens.output
          meter_prices:
            unit_cost_xusd: 140

      - feature_code: anthropic.sonnet-4.5
        feature_family_code: llm.premium
        name: Anthropic Sonnet 4.5
        description: Access to Sonnet 4.5 APIs
        unit: tokens
        meters:
        - unit: tokens
          scale: 0
          rounding: round
          meter_prices:
            unit_price_base_xusd: 180
            unit_price_xusd: 200
            unit_quantity_minor: 1
            rounding: nearest
            unit_cost_xusd: 150
            cost_unit_quantity_minor: 1
            cost_rounding: ceil
            effective_at: now()
        - meter_code: anthropic.sonnet-4.5.tokens.input
          meter_prices:
            unit_price_base_xusd: 200
            unit_cost_xusd: 150
            cost_unit_quantity_minor: 1
        - meter_code: anthropic.sonnet-4.5.tokens.output
          meter_prices:
            unit_price_base_xusd: 200
            unit_cost_xusd: 180
            cost_unit_quantity_minor: 1

      - feature_code: svc.tools
        feature_family_code: svc.tools
        name: Service Tools
        description: Access to Tools Service
        unit: request
        meters:
        - meter_code: svc.tools
          meter_prices:
            unit_price_base_xusd: 50
            unit_price_xusd: 50
            unit_quantity_minor: 1
            rounding: floor
            unit_cost_xusd: 10
            cost_unit_quantity_minor: 1
            cost_rounding: floor
            effective_at: now()        
        - meter_code: svc.tools.req
          meter_prices:
            unit_price_base_xusd: 1
            unit_price_xusd: 1
            unit_quantity_minor: 5
            rounding: floor
            unit_cost_xusd: 1
            cost_unit_quantity_minor: 5
            cost_rounding: floor
            effective_at: now()

      - feature_code: svc.chat
        feature_family_code: llm.standard
        name: Chat Service
        description: Chat service
        unit: tokens
        metadata:
          budget_strategy:
            default_lwm_xusd: 100000
            default_hwm_xusd: 200000

      - feature_code: svc.images
        feature_family_code: llm.multimodal
        name: Images Service
        description: Image generation
        unit: request
        meters:
        - unit: request
          scale: 1
          rounding: floor
          metadata:
            residual_mode: prepaid
          meter_prices:
            unit_price_base_xusd: 50
            unit_price_dynamic_xusd: 0
            unit_price_xusd: 50
            unit_quantity_minor: 2
            rounding: nearest
            unit_cost_xusd: 30
            cost_unit_quantity_minor: 1
            cost_rounding: ceil
            effective_at: now()
        - meter_code: svc.images.generate
          metadata:
            residual_mode: postpaid

      - feature_code: demo.outcome
        feature_family_code: outcome.based.billing
        name: Outcome Demo
        unit: count
        meters:
        - meter_code: demo.outcome
          semantic_kind: outcome
          meter_prices:
            unit_cost_xusd: 1000
            unit_price_xusd: 666666

      - feature_code: billing.seats
        feature_family_code: billing.seats
        name: Seat Billing
        description: Seat usage billing
        unit: seat
        meters:
        - meter_code: billing.seats.assigned
          unit: seat
          meter_prices:
            unit_price_xusd: 1000
            unit_cost_xusd: 100

    billing_plans:
      - plan_code: free_default
        name: Free Default
        kind: base
        priority: 0
        metadata:
          gate_bundle_key: null
          grants: []
          billing_defaults:
            period:
              billing_mode: prepaid
        feature_family_codes:
          - llm.standard
          - svc.tools

      - plan_code: pro
        name: Pro Plan
        kind: base
        priority: 100
        metadata:
          gate_bundle_key: pro_bundle
          grants:
            - template_key: pro.monthly_xusd
              grant_program_code: monthly_xusd
              amount_xusd: 9990000
              on_ledger_override: true
              issue_anchor_override: binding_start
          billing_defaults:
            period:
              billing_mode: prepaid
              issue_anchor: subscription_period_start
        feature_family_codes:
          - llm.standard
          - llm.premium
          - llm.multimodal
          - svc.tools

      - plan_code: pro_team
        name: Team Plan
        kind: base
        priority: 200
        metadata:
          gate_bundle_key: team_bundle
          grants:
            - template_key: pro_team.monthly_xusd
              grant_program_code: monthly_xusd
              amount_xusd: 29990000
              on_ledger_override: true
          billing_defaults:
            period:
              billing_mode: prepaid
              issue_anchor: subscription_period_start
        feature_family_codes:
          - llm.standard
          - llm.premium
          - llm.multimodal
          - svc.tools

      - plan_code: paid_non_sub
        name: Paid but not subscription
        kind: base
        priority: 10
        metadata:
          gate_bundle_key: pro_bundle
          grants: []
          billing_defaults:
            period:
              billing_mode: prepaid
        feature_codes:
          - svc.tools
          - openai.gpt5
          - openai.gpt-4o
        feature_family_codes:
          - llm.standard
          - svc.tools

      - plan_code: pro_postpaid
        name: Pro Plan (Postpaid)
        kind: base
        priority: 100
        metadata:
          gate_bundle_key: pro_bundle
          grants: []
          billing_defaults:
            period:
              billing_mode: postpaid
              issue_anchor: subscription_period_start
        feature_family_codes:
          - llm.standard
          - llm.premium
          - llm.multimodal
          - svc.tools
