version: v2

## Per-realm data
realm_data:
  - realm_id: demo-realm-1

    grant_campaigns:
      - name: Demo Daily Bonus Campaign
        grant_program_code: daily_xusd
        status: active
        window_start: now()
        window_end: null
        target_filter:
          billing_account_ids: []  # empty = all accounts in realm
        metadata:
          seed: true
          grants:
            - grant_program_code: daily_xusd
              amount_xusd: 100000

    meters1:
      - meter_code: svc.images.generate
        feature_code: svc.images
        unit: request
        scale: 2
        rounding: ceil
        meter_prices:
          unit_price_base_xusd: 150
          unit_price_dynamic_xusd: 1
          unit_cost_xusd: 130
          cost_unit_quantity_minor: 2
          cost_rounding: floor
          effective_at: now()
      - meter_code: svc.images.video
        unit: request
        scale: 3
        rounding: floor
        meter_prices:
          unit_cost_xusd: 111

    meter_prices1:
      - meter_code: svc.images
        unit_price_base_xusd: 10
        unit_price_xusd: 10
        unit_quantity_minor: 1
        rounding: floor
        unit_cost_xusd: 10
        cost_unit_quantity_minor: 1
        cost_rounding: floor
        effective_at: now()
      - meter_code: svc.images.video
        unit_price_base_xusd: 1
        unit_price_xusd: 1
        unit_quantity_minor: 5
        rounding: floor
        unit_cost_xusd: 1
        cost_unit_quantity_minor: 5
        cost_rounding: floor
        effective_at: now()

    feature_meters1:
      - feature_code: openai.gpt5
        meter_code: openai.gpt5
        is_primary: true
      - feature_code: openai.gpt-4o
        meter_code: openai.gpt-4o
        is_primary: true
      - feature_code: svc.tools
        meter_code: svc.tools
        is_primary: true
      - feature_code: svc.tools
        meter_code: svc.tools.req
        is_primary: false
      - feature_code: openai.gpt5
        meter_code: openai.gpt5.tokens.input
        is_primary: false
      - feature_code: openai.gpt5
        meter_code: openai.gpt5.tokens.output
        is_primary: false
      - feature_code: openai.gpt-4o
        meter_code: openai.gpt-4o.tokens.input
        is_primary: false
      - feature_code: openai.gpt-4o
        meter_code: openai.gpt-4o.tokens.output
        is_primary: false

    gate_policy_bundles:
      - bundle_key: default_bundle
        name: Default bundle
        status: active
        metadata: { seed: true }
      - bundle_key: pro_bundle
        name: Pro bundle
        status: active
        metadata: { seed: true }
      - bundle_key: team_bundle
        name: Team bundle
        status: active
        metadata: { seed: true }

    gate_policies:
      - feature_code: __wildcard_feature__
        name: seats.assigned@1.0.0#team
        bundle_key: pro_bundle
        description: Team seat limit with usage billing
        kind: seats
        unit: seat
        window_sec: 0
        limit_minor: null
        limit_count: 10
        status: assignable
        metadata:
          billing_feature_code: billing.seats
          billing_meter_code: billing.seats.assigned
          billing_mode: assigned
      - feature_code: openai.gpt5
