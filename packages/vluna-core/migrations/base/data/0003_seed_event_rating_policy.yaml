version: v2

## Per-realm data
realm_data:
  - realm_id: demo-realm-1

    event_rating_policies:
      - policy_id: event_to_ratings
        name: demo.outcome event (local test)
        status: active
      - policy_id: event_to_ratings_aggregate
        name: demo.outcome event aggregate (local test)
        status: active

    billing_contracts:
      - contract_id: '11111111-1111-1111-1111-111111111111'
        billing_account_id: '00000000-0000-0000-0000-000000000000'
        status: active
        effective_at: '2000-01-01T00:00:00Z'
        name: Demo Contract (DevEvents)
        metadata: { seed: true }

    contract_terms:
      - contract_id: '11111111-1111-1111-1111-111111111111'
        kind: e2r_param
        term_key: demo.quantity_multiplier
        effective_at: '2000-01-01T00:00:00Z'
        value_json: 2
      - contract_id: '11111111-1111-1111-1111-111111111111'
        kind: pricing
        # term_key for kind=pricing is meter_code
        term_key: demo.outcome
        effective_at: '2000-01-01T00:00:00Z'
        value_json:
          schema: vluna/contract_pricing:v1
          meter_code: demo.outcome
          cost:
            base: unit_cost_xusd
            adjustments:
              - op: fixed
                unit_price_xusd: '10'
          price:
            base: unit_price_xusd
            adjustments:
              - op: multiplier
                multiplier: '1.2'
                rounding: nearest
              - op: delta
                delta_xusd: '1'

    event_rating_policy_versions:
      - policy_id: event_to_ratings
        policy_version: v1
        status: active
        effective_at: '2000-01-01T00:00:00Z'
        dsl_hash: seed:demo-realm-1:event_to_ratings:v1:dsl_v1_terms
        dsl_json:
          dsl_version: v1
          engine: single
          params:
            quantity_multiplier:
              type: int
              min: 0
              default: 1
              source: { term_key: demo.quantity_multiplier }
          match:
            event_type: demo.outcome
          emit:
            intents:
              - link_kind: billed
                feature_code: demo.outcome
                meters:
                  - meter_code: demo.outcome
                    quantity_minor:
                      mul:
                        - { payload_int: usage.tokens, default: 0 }
                        - { param: quantity_multiplier }
                labels:
                  example: phase3-event

      - policy_id: event_to_ratings_aggregate
        policy_version: v1
        status: active
        effective_at: '2000-01-01T00:00:00Z'
        dsl_hash: seed:demo-realm-1:event_to_ratings_aggregate:v1:dsl_v1_terms
        dsl_json:
          dsl_version: v1
          engine: aggregate
          params:
            quantity_multiplier:
              type: int
              min: 0
              default: 1
              source: { term_key: demo.quantity_multiplier }
          match:
            event_type: demo.outcome.aggr
          emit:
            intents:
              - link_kind: billed
                feature_code: demo.outcome
                meters:
                  - meter_code: demo.outcome
                    quantity_minor:
                      mul:
                        - { agg: { op: count } }
                        - { param: quantity_multiplier }
                labels:
                  example: phase3-aggregate
